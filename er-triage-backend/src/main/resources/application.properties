# Server
server.port=${PORT:8081}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ertriagedb}
spring.data.mongodb.auto-index-creation=true

# Gemini Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent

# HuggingFace Configuration
hf.api.key=${HF_API_KEY}
hf.api.url=https://router.huggingface.co/v1/chat/completions
hf.model.id=Qwen/Qwen2.5-7B-Instruct

# AI Provider Toggle (options: huggingface, gemini)
ai.provider=${AI_PROVIDER:huggingface}

# JWT Configuration
jwt.secret=${JWT_SECRET:ErTriageSecretKeyMustBeAtLeast32BytesLong123}

# CORS configuration (comma-separated origin patterns)
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://hackcrux-phi.vercel.app,https://*.vercel.app}